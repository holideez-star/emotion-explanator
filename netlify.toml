[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["lib/**"]

[functions.bestseller]
  timeout = 26

[functions.search]
  timeout = 15

[functions.book]
  timeout = 15

[functions.science-stats]
  timeout = 20

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

[[redirects]]
  from = "/api/bestseller"
  to = "/.netlify/functions/bestseller"
  status = 200
  force = true

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200
  force = true

[[redirects]]
  from = "/api/book"
  to = "/.netlify/functions/book"
  status = 200
  force = true

[[redirects]]
  from = "/api/science-stats"
  to = "/.netlify/functions/science-stats"
  status = 200
  force = true
